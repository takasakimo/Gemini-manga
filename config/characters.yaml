series:
  title: サンプル漫画
  art_style: 'Professional Japanese manga style (本格漫画・出版品質):

    - Black and white: Clean black ink line art, consistent line weight, no colors
    - Screentone: Halftone dot patterns for shading (clothing, hair, shadows, backgrounds). Use varying dot density for depth
    - Hatching: Fine line-hatching for darker shadows when appropriate
    - Speech bubbles: Oval bubbles with tail pointing to speaker. Text must be VERTICAL (縦書き・tategaki) Japanese
    - Thought bubbles: Oval with radiating cloud-like border for inner monologue (内心・心の声)
    - Onomatopoeia: Draw stylized Japanese sound effects (擬音語) as graphic elements IN the scene (e.g. コツ ザッ ドキ) - integrated into artwork, not plain text
    - Visual cues: Focus lines (集中線), action lines (効果線), speed lines for movement; blush lines (照れ), sweat drop (汗) for emotions
    - Gutters: Clear white space between panels. Varied panel sizes for dynamic reading flow
    - Character design: Anime/manga style, expressive faces, proper proportions, consistent across panels
    - Publication quality: Like Weekly Shounen Jump, tankobon manga magazines
    '
  style_negative: 'Avoid: photorealistic, 3D render, smooth gradients, Western comic style,

    horizontal text in bubbles, flat coloring, inconsistent screentone,

    blurry text, messy line work, changing art style between panels

    '
