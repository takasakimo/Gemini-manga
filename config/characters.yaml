series:
  title: サンプル漫画
  art_style: 'Japanese manga style, like professional manga generation app output:

    - Clean, crisp black ink line art, consistent line weight

    - Screentone (halftone) shading for shadows and depth

    - Gray scale tones (black, grays, white), no flat color unless specified

    - Single manga panel composition, publication-ready quality

    - Clear speech bubbles with readable Japanese text when dialogue is given

    - Anime/manga character design, expressive faces, proper proportions

    '
  style_negative: 'Avoid: photorealistic, 3D render, changing line style between panels,

    inconsistent shading, different color palette, Western comic style,

    blurry text, messy line work

    '
